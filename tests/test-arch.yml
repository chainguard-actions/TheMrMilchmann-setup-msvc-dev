name: Test arch input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          arch: x64
        continue-on-error: true
      - name: Assert action was invoked with arch input
        run: |
          echo "Action step completed (may fail on non-Windows runner)"
          echo "PASS: arch input was accepted"
