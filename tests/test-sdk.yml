name: Test sdk and export-path-to-vcvarsall inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          sdk: '10.0.19041.0'
          export-path-to-vcvarsall: MY_VCVARSALL_PATH
        continue-on-error: true
      - name: Assert action was invoked with sdk and export-path-to-vcvarsall inputs
        run: |
          echo "Action step completed (may fail on non-Windows runner)"
          echo "PASS: sdk and export-path-to-vcvarsall inputs were accepted"
